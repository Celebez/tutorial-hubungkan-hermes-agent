  <rect x="110" y="110" width="180" height="30" rx="8" fill="#2b2d40"/>
  <text x="125" y="130" fill="#8b8ca3" font-family="monospace" font-size="11">Terintegrasi via Telegram</text>
  <!-- Status indicators -->
