      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="msg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="20"/>
  <!-- Bot avatar -->
  <circle cx="60" cy="80" r="30" fill="#5865F2"/>
  <circle cx="60" cy="68" r="12" fill="#fff"/>
  <rect x="45" y="78" width="30" height="20" rx="5" fill="#5865F2"/>
